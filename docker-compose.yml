# Docker Compose for local, production-like runs of the full stack.
# Usage:
#   1. Copy backend/.env.example to backend/.env and set GEMINI_API_KEY
#   2. docker compose up --build

services:
  backend:
    build:
      context: ./backend
    container_name: groweasy-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-25}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is inlined at build time; pass it as a build arg.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    container_name: groweasy-frontend
    ports:
      - "3000:3000"
    environment:
      # The browser calls the backend directly, so this points at localhost.
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    depends_on:
      - backend
    restart: unless-stopped
